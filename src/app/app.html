<div class="container mx-auto mt-5">
  <app-layout-slot>
    <div left>
      Left content
    </div>

    <div right>
      Right content
    </div>
  </app-layout-slot>

  <app-post-list />
  <app-counter-display />

  <button (click)="counterService.increment()">
    + Erhöhen
  </button>
  <button (click)="counterService.decrement()">
    - Senken
  </button>
  <button (click)="counterService.reset()" class="reset">
    Zurücksetzen
  </button>
</div>
